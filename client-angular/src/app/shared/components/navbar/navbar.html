<nav class="fixed top-0 left-0 w-full z-50">
  <div class="mx-auto w-full max-w-screen-xl flex justify-between items-center px-4 py-4 sm:px-24 sm:py-6 gap-4">
    <a routerLink="/" class="pointer shrink-0">
      <img
        src="/assets/jpg/icon.jpg"
        alt="Logo"
        class="w-20 h-20 sm:w-32 sm:h-32 border border-gray-500 rounded-full object-cover shrink-0"
      />
    </a>

    @if (userData(); as user) {
      <div class="w-10 h-10 flex justify-center items-center rounded-full bg-black text-white relative shrink-0" (click)="toggleMenu()">
        <div>{{ user.name[0].toUpperCase() }}</div>
        @if (showMenu()) {
          <div class="absolute top-0 right-0 z-10 text-black rounded pt-10 w-40">
            <ul class="bg-white rounded shadow">
              @if (!user.isAccountVerified) {
                <li (click)="sendVerificationOtp()" class="py-1 px-2 hover:bg-gray-200 cursor-pointer">
                  Verificar email
                </li>
              }
              <li (click)="logout()" class="py-1 px-2 hover:bg-gray-200 cursor-pointer pr-10">
                Logout
              </li>
            </ul>
          </div>
        }
      </div>
    } @else {
      @if (isLoginPage()) {
        <a
          routerLink="/signup"
          class="flex items-center gap-2 border border-gray-500 rounded-full px-4 sm:px-6 py-2 text-gray-800 hover:bg-gray-100 transition-all shrink-0"
        >
          Cadastro <img src="/assets/svg/arrow.svg" alt="Cadastro" />
        </a>
      } @else {
        <a
          routerLink="/login"
          class="flex items-center gap-2 border border-gray-500 rounded-full px-4 sm:px-6 py-2 text-gray-800 hover:bg-gray-100 transition-all shrink-0"
        >
          Login <img src="/assets/svg/arrow.svg" alt="Login" />
        </a>
      }
    }
  </div>
</nav>
